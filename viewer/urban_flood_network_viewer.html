<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>도시침수 SWMM 네트워크 보기</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #697586;
      --line: #d6dce5;
      --blue: #2574d9;
      --green: #18905a;
      --orange: #d97706;
      --red: #d8342a;
      --purple: #7c3aed;
      --cyan: #0891b2;
      --shadow: 0 10px 30px rgba(22, 34, 51, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 22px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.92);
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(10px);
    }
    h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0;
    }
    .sub { margin-top: 4px; color: var(--muted); font-size: 13px; }
    .controls { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 14px;
      cursor: pointer;
    }
    button.active { background: #162033; color: #fff; border-color: #162033; }
    main { padding: 18px; display: grid; grid-template-columns: minmax(760px, 1fr) 360px; gap: 18px; }
    .canvas-wrap, aside {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }
    .canvas-wrap { overflow: auto; }
    svg { display: block; min-width: 1280px; width: 100%; height: 720px; background: #fbfcfe; }
    aside { padding: 16px; align-self: start; position: sticky; top: 88px; max-height: calc(100vh - 106px); overflow: auto; }
    h2 { margin: 0 0 10px; font-size: 17px; }
    h3 { margin: 18px 0 8px; font-size: 14px; }
    .note { color: var(--muted); line-height: 1.55; font-size: 13px; }
    .legend { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 12px 0; }
    .legend span { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--muted); }
    .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .stat { border: 1px solid var(--line); border-radius: 8px; padding: 9px; background: #fbfcfe; }
    .stat b { display: block; font-size: 16px; margin-bottom: 3px; }
    .stat span { font-size: 12px; color: var(--muted); }
    .event { border-left: 4px solid var(--orange); padding: 8px 10px; background: #fff7ed; margin: 8px 0; font-size: 13px; line-height: 1.45; border-radius: 6px; }
    .event.reverse { border-left-color: var(--purple); background: #f5f3ff; }
    .node { cursor: pointer; }
    .node rect, .node circle { stroke: #263445; stroke-width: 1.6; }
    .node text { pointer-events: none; font-size: 12px; fill: #142033; font-weight: 650; letter-spacing: 0; }
    .link { fill: none; stroke: #a9b4c3; stroke-width: 4; marker-end: url(#arrow); }
    .link-label { font-size: 11px; fill: #64748b; paint-order: stroke; stroke: #fbfcfe; stroke-width: 4px; stroke-linejoin: round; }
    .link.warning { stroke: var(--orange); stroke-width: 7; }
    .link.danger { stroke: var(--red); stroke-width: 8; }
    .link.reverse { stroke: var(--purple); stroke-width: 8; stroke-dasharray: 9 6; }
    .link.ok { stroke: #91a3b8; }
    .badge { font-size: 11px; fill: #fff; font-weight: 700; }
    .band-label { font-size: 13px; fill: #475569; font-weight: 700; }
    .water-bg { fill: #e0f2fe; stroke: #7dd3fc; stroke-width: 1; }
    .sewer-bg { fill: #eef2ff; stroke: #c7d2fe; stroke-width: 1; }
    .selected-outline { stroke: #111827 !important; stroke-width: 4 !important; }
    .small { font-size: 12px; color: var(--muted); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 8px; }
    td { padding: 6px 0; border-bottom: 1px solid #edf1f5; }
    td:last-child { text-align: right; font-variant-numeric: tabular-nums; }
    @media (max-width: 1100px) {
      main { grid-template-columns: 1fr; }
      aside { position: static; max-height: none; }
      header { align-items: flex-start; flex-direction: column; }
      .controls { justify-content: flex-start; }
    }
  </style>
</head>

  <header>
    <div>
      <h1>도시침수 SWMM 네트워크 보기</h1>
      <div class="sub">숫자표 대신, 지금 설계한 빗물받이·본관·펌프장·월류시설·물재생센터 흐름을 눈으로 보는 화면</div>
    </div>
    <div class="controls">

      <button id="btn-backflow" data-scenario="backflow">하천 역류</button>
      <button id="btn-reset">전체 보기</button>
    </div>
  </header>
  <main>

          </marker>
        </defs>
        <rect class="water-bg" x="28" y="30" width="1430" height="330" rx="8"></rect>
        <rect class="sewer-bg" x="28" y="390" width="1430" height="250" rx="8"></rect>
        <text class="band-label" x="44" y="52">우수 흐름: 빗물받이 → 우수 본관 → 빗물펌프장 → 하천</text>
        <text class="band-label" x="44" y="412">오수/합류 흐름: 생활오수·빗물 → 합류식 하수관거 → 차집관거/월류시설 → 물재생센터·하천</text>
        <g id="links"></g>
        <g id="nodes"></g>
      </svg>
    </section>
    <aside>
      <h2 id="panel-title">기본 폭우 상황</h2>
      <p class="note" id="panel-summary"></p>
      <div class="legend">

        <span><i class="dot" style="background:#7c3aed"></i>역류 후보</span>
      </div>
      <h3>선택 지점</h3>
      <div id="selection" class="note">그림에서 빗물받이, 맨홀, 관, 펌프장, 월류시설을 클릭하면 해당 지점의 가상 센서값이 표시됩니다.</div>
      <div id="stats"></div>
      <h3>문제 이벤트</h3>
      <div id="events"></div>
      <h3>읽는 법</h3>
      <p class="note">빨간색은 물이 넘치거나 병목이 강한 곳, 보라색 점선은 역류 후보입니다. 이번 그림은 실제 서울 지도 좌표가 아니라, 우리가 만든 시뮬레이션 네트워크를 이해하기 쉽게 배치한 개념도입니다.</p>
    </aside>
  </main>

  if (num(m.min_flow_cms) < -0.001 && scenario === 'backflow') return 'reverse';
  if (num(m.max_fullness_ratio) >= 0.75) return 'warning';
  return 'ok';
}
function linkPath(l) {
  const a = nodeById[l.from], b = nodeById[l.to];
  const dx = Math.abs(b.x - a.x), dy = Math.abs(b.y - a.y);
  const curve = Math.max(28, Math.min(90, (dx + dy) * 0.18));
  if (Math.abs(a.y - b.y) < 18) return `M ${a.x} ${a.y} C ${a.x + curve} ${a.y}, ${b.x - curve} ${b.y}, ${b.x} ${b.y}`;
  return `M ${a.x} ${a.y} C ${a.x + curve} ${a.y}, ${b.x - curve} ${b.y}, ${b.x} ${b.y}`;
}
function linkMid(l) {
  const a = nodeById[l.from], b = nodeById[l.to];
  return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 - 8 };
}
function render() {
  const linksG = document.getElementById('links');
  const nodesG = document.getElementById('nodes');
  linksG.innerHTML = '';
  nodesG.innerHTML = '';
  for (const l of DATA.links) {
    const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    p.setAttribute('d', linkPath(l));
    const st = statusForId(l.id);
    p.setAttribute('class', `link ${st}`);
    p.dataset.id = l.id;
    p.addEventListener('click', () => select(l.id));
    linksG.appendChild(p);
    const mid = linkMid(l);
    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('class', 'link-label');
    label.setAttribute('x', mid.x);
    label.setAttribute('y', mid.y);
    label.setAttribute('text-anchor', 'middle');
    label.textContent = l.label;
    linksG.appendChild(label);
  }
  for (const n of DATA.nodes) {
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('class', 'node');
    g.dataset.id = n.id;
    const st = statusForId(n.id);
    const fill = st === 'danger' ? '#fecaca' : st === 'warning' ? '#fed7aa' : st === 'reverse' ? '#ddd6fe' : colors[n.type] || '#cbd5e1';
    if (['RAIN','RIVER','SEA'].includes(n.id)) {
      const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      c.setAttribute('cx', n.x); c.setAttribute('cy', n.y); c.setAttribute('r', 36); c.setAttribute('fill', fill);
      if (selectedId === n.id) c.setAttribute('class', 'selected-outline');
      g.appendChild(c);
    } else {
      const r = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      r.setAttribute('x', n.x - 58); r.setAttribute('y', n.y - 23); r.setAttribute('width', 116); r.setAttribute('height', 46); r.setAttribute('rx', 8); r.setAttribute('fill', fill);
      if (selectedId === n.id) r.setAttribute('class', 'selected-outline');
      g.appendChild(r);
    }
    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t.setAttribute('x', n.x); t.setAttribute('y', n.y + 4); t.setAttribute('text-anchor', 'middle');
    t.textContent = n.label;
    g.appendChild(t);
    const stLabel = st === 'danger' ? '침수' : st === 'warning' ? '주의' : st === 'reverse' ? '역류' : '';
    if (stLabel) {
      const badge = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      const br = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      br.setAttribute('x', n.x + 34); br.setAttribute('y', n.y - 37); br.setAttribute('width', 42); br.setAttribute('height', 20); br.setAttribute('rx', 8);
      br.setAttribute('fill', st === 'reverse' ? '#7c3aed' : st === 'danger' ? '#d8342a' : '#d97706');
      const bt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      bt.setAttribute('class', 'badge'); bt.setAttribute('x', n.x + 55); bt.setAttribute('y', n.y - 23); bt.setAttribute('text-anchor', 'middle'); bt.textContent = stLabel;
      badge.appendChild(br); badge.appendChild(bt); g.appendChild(badge);
    }
    g.addEventListener('click', () => select(n.id));
    nodesG.appendChild(g);
  }
  updatePanel();
}
function select(id) { selectedId = id; render(); }
function scenarioSummary() {
  if (scenario === 'base') return '기본 폭우에서는 CB3 빗물받이와 CB3 연결관에서 병목이 먼저 나타납니다. 우수 본관 하류는 아직 여유가 있어, 첫 조치 대상은 본관 전체가 아니라 해당 빗물받이/연결관입니다.';
  return '하천 역류에서는 월류 방류관과 펌프 토출관에서 역방향 유량 후보가 늘어납니다. 같은 폭우라도 하천 수위가 높으면 방류구와 토출부가 배수를 방해할 수 있습니다.';
}
function updatePanel() {
  document.getElementById('panel-title').textContent = scenario === 'base' ? '기본 폭우 상황' : '하천 역류 상황';
  document.getElementById('panel-summary').textContent = scenarioSummary();
  const events = DATA.events.filter(e => e.scenario === scenario);
  const ev = document.getElementById('events');
  ev.innerHTML = events.length ? events.map(e => `<div class="event ${e.event_type.includes('reverse') ? 'reverse' : ''}"><b>${e.id}</b><br>${e.meaning}<br><span class="small">${e.count}건, 최악값 ${e.worst_value}, 시각 ${e.time}</span></div>`).join('') : '<p class="note">현재 시나리오에서 따로 잡힌 문제 이벤트가 없습니다.</p>';
  const selected = selectedId || (scenario === 'base' ? 'CB3' : 'OVF_PIPE');
  const n = nodeById[selected] || linkById[selected];
  const m = metric(selected);
  document.getElementById('selection').innerHTML = `<b>${n ? n.label : selected}</b><br>${n?.desc || '관 또는 시설 연결부입니다.'}`;
  const stats = document.getElementById('stats');
  if (!m) {
    stats.innerHTML = '<p class="note">이 지점은 개념 흐름 표시용이라 직접 센서값은 없습니다.</p>';
    return;
  }
  stats.innerHTML = `
    <div class="stat-grid">
      <div class="stat"><b>${fmt(m.max_depth_m, ' m')}</b><span>최대 수위</span></div>
      <div class="stat"><b>${fmt(m.max_flow_cms, ' m3/s')}</b><span>최대 유량</span></div>
      <div class="stat"><b>${fmt(m.min_flow_cms, ' m3/s')}</b><span>최소 유량</span></div>
      <div class="stat"><b>${fmt(m.max_velocity_mps, ' m/s')}</b><span>최대 유속</span></div>
      <div class="stat"><b>${fmt(m.max_fullness_ratio, '')}</b><span>최대 만관비</span></div>
      <div class="stat"><b>${fmt(m.max_flooding_cms, ' m3/s')}</b><span>침수 유량</span></div>
    </div>
    <table>
      <tr><td>최대수위 시각</td><td>${m.time_of_max_depth}</td></tr>
      <tr><td>최저유량 시각</td><td>${m.time_of_min_flow}</td></tr>
      <tr><td>센서 종류</td><td>${m.sensor_type}</td></tr>
    </table>`;
}
document.querySelectorAll('button[data-scenario]').forEach(btn => btn.addEventListener('click', () => {
  scenario = btn.dataset.scenario;
  selectedId = scenario === 'base' ? 'CB3' : 'OVF_PIPE';
  document.querySelectorAll('button[data-scenario]').forEach(b => b.classList.toggle('active', b === btn));
  render();
}));
document.getElementById('btn-reset').addEventListener('click', () => { selectedId = null; render(); });
selectedId = 'CB3';
render();
</script>
</body>
</html>
