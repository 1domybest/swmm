<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>전체 도시 배수도 - 분류식 합류식 하천</title>
<style>
:root {
  --bg: #f3f6fb;
  --panel: #ffffff;
  --ink: #172033;
  --muted: #667085;
  --line: #d8e0ec;
  --sky: #eaf7ff;
  --soil: #8d5935;
  --soil-line: #b77a4e;
  --ground-edge: #59351f;
  --storm: #2388f6;
  --storm-soft: #e2f1ff;
  --sewer: #a4672b;
  --sewer-soft: #fff0dc;
  --combined: #7657d7;
  --combined-soft: #eee8ff;
  --river: #25b8c3;
  --river-soft: #d8fbfb;
  --road: #111827;
  --shadow: 0 14px 34px rgba(16, 24, 40, .10);
}
* { box-sizing: border-box; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  letter-spacing: 0;
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  padding: 18px 24px;
  background: rgba(255, 255, 255, .95);
  border-bottom: 1px solid var(--line);
  position: sticky;
  top: 0;
  z-index: 10;
  backdrop-filter: blur(10px);
}
h1 { margin: 0 0 6px; font-size: 23px; }
.sub { color: var(--muted); font-size: 13px; line-height: 1.45; }
.flow-mode-controls {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 0 0 auto;
}
.header-controls {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
  justify-content: flex-end;
  flex: 0 0 auto;
}
.playback-controls {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  border: 1px solid #d8e0ec;
  border-radius: 10px;
  background: #f8fafc;
}
.playback-control {
  display: flex;
  align-items: center;
  gap: 7px;
  color: #334155;
  font-size: 12px;
  font-weight: 850;
  white-space: nowrap;
}
.playback-control select,
.playback-controls button {
  height: 34px;
  border: 1px solid #cbd5e1;
  border-radius: 8px;
  background: #fff;
  color: #172033;
  font-size: 12px;
  font-weight: 850;
}
.playback-control select {
  padding: 0 28px 0 10px;
}
.playback-controls button {
  padding: 0 12px;
  cursor: pointer;
}
.playback-controls button.is-playing {
  border-color: #172033;
  background: #172033;
  color: #fff;
}
.playback-time {
  width: 170px;
  accent-color: #2388f6;
}
.playback-output {
  min-width: 138px;
  color: #172033;
  font-size: 12px;
  font-weight: 900;
  font-variant-numeric: tabular-nums;
}
.hydraulic-controls {
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;
  padding: 10px 12px;
  border: 1px solid #d8e0ec;
  border-radius: 10px;
  background: #f8fafc;
}
.hydraulic-control {
  display: grid;
  grid-template-columns: 92px 150px 48px;
  align-items: center;
  gap: 8px;
  color: #334155;
  font-size: 12px;
  font-weight: 850;
  white-space: nowrap;
}
.hydraulic-control input {
  width: 150px;
  accent-color: #2388f6;
}
.hydraulic-control output {
  color: #172033;
  font-variant-numeric: tabular-nums;
  text-align: right;
}
.weather-controls {
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;
  padding: 10px 12px;
  border: 1px solid #d8e0ec;
  border-radius: 10px;
  background: #f8fafc;
}
.weather-control {
  display: grid;
  grid-template-columns: 56px 150px 42px;
  align-items: center;
  gap: 8px;
  color: #334155;
  font-size: 12px;
  font-weight: 850;
  white-space: nowrap;
}
.weather-control input {
  width: 150px;
  accent-color: #2388f6;
}
.weather-control output {
  color: #172033;
  font-variant-numeric: tabular-nums;
  text-align: right;
}
.flow-mode-controls button {
  border: 1px solid #cbd5e1;
  background: #fff;
  color: #334155;
  border-radius: 8px;
  padding: 9px 14px;
  font-size: 13px;
  font-weight: 850;
  cursor: pointer;
}
.flow-mode-controls button.is-active {
  border-color: #172033;
  background: #172033;
  color: #fff;
}
main { padding: 18px; }
.workbench {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 380px;
  gap: 16px;
  align-items: start;
}
.stage {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
  box-shadow: var(--shadow);
  overflow: auto;
  max-height: calc(100vh - 104px);
}
.object-panel {
  position: sticky;
  top: 104px;
  max-height: calc(100vh - 122px);
  overflow: auto;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
  box-shadow: var(--shadow);
  padding: 18px;
}
.object-panel-kicker {
  margin: 0 0 8px;
  color: #2388f6;
  font-size: 12px;
  font-weight: 950;
}
.object-panel h2 {
  margin: 0 0 8px;
  font-size: 22px;
}
.object-panel p {
  margin: 0;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.55;
}
.object-meta {
  display: grid;
  grid-template-columns: 82px 1fr;
  gap: 8px 10px;
  margin: 16px 0 0;
  padding: 12px;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  background: #f8fafc;
}
.object-meta dt {
  color: #64748b;
  font-size: 12px;
  font-weight: 900;
}
.object-meta dd {
  margin: 0;
  color: #172033;
  font-size: 12px;
  font-weight: 850;
  word-break: break-all;
}
.object-metrics {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 14px;
}
.object-metric {
  min-height: 74px;
  border: 1px solid #d8e0ec;
  border-radius: 8px;
  padding: 10px;
  background: #fbfdff;
}
.object-metric strong {
  display: block;
  color: #111827;
  font-size: 19px;
  font-weight: 950;
  line-height: 1.15;
}
.object-metric span {
  display: block;
  margin-top: 5px;
  color: #667085;
  font-size: 12px;
  font-weight: 850;
}
.exception-controls {
  margin-top: 16px;
  padding: 14px;
  border: 1px solid #d8e0ec;
  border-radius: 8px;
  background: #f8fafc;
}
.exception-control-row {
  display: grid;
  grid-template-columns: 1fr 58px;
  align-items: center;
  gap: 10px;
  color: #172033;
  font-size: 13px;
  font-weight: 950;
}
.exception-control-row input {
  grid-column: 1 / -1;
  width: 100%;
  accent-color: #ef4444;
}
.exception-control-row output {
  color: #b91c1c;
  font-variant-numeric: tabular-nums;
  text-align: right;
}
.payload-preview {
  margin-top: 14px;
}
.payload-preview pre {
  max-height: 156px;
  overflow: auto;
  margin: 8px 0 0;
  padding: 10px;
  border-radius: 8px;
  background: #0f172a;
  color: #dbeafe;
  font-size: 11px;
  line-height: 1.45;
  white-space: pre-wrap;
}
.object-empty .object-metrics,
.object-empty .exception-controls,
.object-empty .payload-preview {
  display: none;
}
svg {
  display: block;
  width: 7600px;
  height: 1870px;
  max-width: none;
}
.page-title {
  fill: #172033;
  font-size: 42px;
  font-weight: 950;
  paint-order: stroke;
  stroke: rgba(255,255,255,.92);
  stroke-width: 7px;
  stroke-linejoin: round;
}
.label {
  fill: #172033;
  font-size: 22px;
  font-weight: 900;
  paint-order: stroke;
  stroke: rgba(255,255,255,.92);
  stroke-width: 6px;
  stroke-linejoin: round;
}
.small-label {
  fill: #4d5d70;
  font-size: 15px;
  font-weight: 800;
  paint-order: stroke;
  stroke: rgba(255,255,255,.92);
  stroke-width: 5px;
  stroke-linejoin: round;
}
.flow-gate {
  transform-box: view-box;
  transform-origin: 4724px 840px;
  transform: rotate(var(--gate-rotation, 0deg));
  transition: transform .45s ease;
}
.pump-blades {
  transform-box: view-box;
  transform-origin: 5095px 1152px;
  animation: pumpSpin 1.1s linear infinite;
  animation-play-state: paused;
  opacity: .35;
  transition: opacity .25s ease;
}
.water-flow {
  fill: none;
  stroke: var(--flow-color, #91a4b8);
  stroke-width: var(--flow-width, 14);
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-dasharray: var(--flow-dash, 24 22);
  stroke-dashoffset: 0;
  animation: waterFlow var(--flow-duration, 2.3s) linear infinite;
  opacity: .82;
  pointer-events: stroke;
  cursor: pointer;
  will-change: stroke-dashoffset;
}
.pipe-hit-area {
  fill: none;
  stroke: transparent;
  stroke-width: 62;
  stroke-linecap: butt;
  stroke-linejoin: round;
  pointer-events: stroke;
  cursor: pointer;
}
.pipe-hit-area.medium { stroke-width: 84; }
.pipe-hit-area.large { stroke-width: 116; }
.water-flow.small {
  --flow-width: 10;
  --flow-dash: 18 18;
  --flow-offset: -36;
  --flow-duration: 1.8s;
}
.water-flow.medium {
  --flow-width: 14;
  --flow-dash: 24 22;
  --flow-offset: -46;
  --flow-duration: 2.3s;
}
.water-flow.large {
  --flow-width: 18;
  --flow-dash: 30 26;
  --flow-offset: -56;
  --flow-duration: 2.8s;
}
.water-flow.backflow {
  --flow-color: #b91c1c;
  animation-name: waterBackflow;
  opacity: .86;
  stroke-width: var(--flow-width, 14);
  stroke-dasharray: var(--flow-dash, 24 22);
}
.water-flow.backflow.small { --backflow-offset: 36; }
.water-flow.backflow.medium { --backflow-offset: 46; }
.water-flow.backflow.large { --backflow-offset: 56; }
.water-flow.is-hidden-flow {
  display: none;
}
.pipe-fullness {
  pointer-events: none;
  opacity: .68;
  transform-box: fill-box;
  transform-origin: center bottom;
  animation: pipeFullLevel 9s ease-in-out infinite;
  will-change: transform;
}
.pipe-fullness[data-pipe-level-for] {
  pointer-events: auto;
  cursor: pointer;
}
[data-asset-id] {
  cursor: pointer;
}
.water-flow.is-selected,
.pipe-fullness.is-selected,
.pipe-hit-area.is-selected,
[data-asset-id].is-selected {
  filter: drop-shadow(0 0 10px rgba(37, 99, 235, .72));
}
.water-flow.has-exception,
.pipe-fullness.has-exception,
.pipe-hit-area.has-exception,
[data-asset-id].has-exception {
  filter: drop-shadow(0 0 10px rgba(239, 68, 68, .65));
}
.water-flow.is-selected.has-exception,
.pipe-fullness.is-selected.has-exception,
.pipe-hit-area.is-selected.has-exception,
[data-asset-id].is-selected.has-exception {
  filter: drop-shadow(0 0 10px rgba(37, 99, 235, .72)) drop-shadow(0 0 8px rgba(239, 68, 68, .65));
}
.catch-basin-fullness {
  fill: var(--fullness-color, #38bdf8);
  pointer-events: none;
  opacity: .86;
  transform-box: fill-box;
  transform-origin: center bottom;
  animation: catchBasinFullLevel 7s ease-in-out infinite;
  will-change: transform;
}
.pipe-wave-base {
  fill: var(--fullness-color, #38bdf8);
  animation: pipeFullColor 9s ease-in-out infinite;
}
.pipe-wave-line {
  animation: pipeWaveHide 9s ease-in-out infinite;
}
@keyframes flowGateOpenClose {
  0%, 42% { transform: rotate(0deg); }
  58%, 82% { transform: rotate(42deg); }
  100% { transform: rotate(0deg); }
}
@keyframes waterFlow {
  to { stroke-dashoffset: var(--flow-offset, -56); }
}
@keyframes waterBackflow {
  to { stroke-dashoffset: var(--backflow-offset, 56); }
}
@keyframes pipeFullLevel {
  0%, 12% { transform: scaleY(.12); }
  58%, 78% { transform: scaleY(1); }
  100% { transform: scaleY(.12); }
}
@keyframes catchBasinFullLevel {
  0%, 12% { transform: scaleY(.18); }
  58%, 78% { transform: scaleY(1); }
  100% { transform: scaleY(.18); }
}
@keyframes pipeFullColor {
  0%, 24% { fill: #38bdf8; }
  58%, 78% { fill: #ef4444; }
  100% { fill: #38bdf8; }
}
@keyframes pipeWaveHide {
  0%, 50% { opacity: .72; }
  60%, 82% { opacity: 0; }
  100% { opacity: .72; }
}
@keyframes pumpSpin {
  to { transform: rotate(360deg); }
}
.weather-layer {
  pointer-events: none;
}
.weather-sun {
  opacity: var(--weather-sun-opacity, 1);
  transform-box: view-box;
  transform-origin: 170px 42px;
  transition: opacity .25s ease;
}
.weather-sun-core {
  fill: #facc15;
  stroke: #f59e0b;
  stroke-width: 4;
}
.weather-sun-ray {
  stroke: #f59e0b;
  stroke-width: 5;
  stroke-linecap: round;
}
.weather-cloud {
  fill: var(--weather-cloud-fill, #ffffff);
  stroke: var(--weather-cloud-stroke, #d8e0ec);
  stroke-width: 3;
  filter: url(#softShadow);
  transition: fill .25s ease, stroke .25s ease, opacity .25s ease;
}
.weather-cloud-1 { opacity: var(--weather-cloud-1-opacity, 0); }
.weather-cloud-2 { opacity: var(--weather-cloud-2-opacity, 0); }
.weather-cloud-3 { opacity: var(--weather-cloud-3-opacity, 0); }
.weather-cloud-4 { opacity: var(--weather-cloud-4-opacity, 0); }
.weather-cloud-5 { opacity: var(--weather-cloud-5-opacity, 0); }
.weather-rain-field {
  opacity: var(--weather-rain-opacity, 0);
  transition: opacity .2s ease;
}
.weather-raindrop {
  stroke: #2388f6;
  stroke-width: 7;
  stroke-linecap: round;
  opacity: .92;
  transform-box: view-box;
  animation: weatherRainFall var(--weather-rain-duration, 1.6s) linear infinite;
  will-change: transform;
}
.weather-raindrop:nth-child(3n) { animation-delay: -.22s; }
.weather-raindrop:nth-child(3n + 1) { animation-delay: -.58s; }
.weather-raindrop:nth-child(4n) { animation-delay: -.92s; }
@keyframes weatherRainFall {
  from { transform: translateY(-90px); }
  to { transform: translateY(220px); }
}
body[data-fullness-state="manual"] .pipe-fullness,
body[data-fullness-state="manual"] .catch-basin-fullness,
body[data-fullness-state="manual"] .pipe-wave-base {
  animation: none;
}
body[data-fullness-level="full"] .pipe-wave-line {
  animation: none;
  opacity: 0;
}
body[data-playback-paused="true"] .flow-gate,
body[data-playback-paused="true"] .pump-blades,
body[data-playback-paused="true"] .water-flow,
body[data-playback-paused="true"] .weather-raindrop,
body[data-playback-paused="true"] .catch-basin-fullness,
body[data-playback-paused="true"] .pipe-fullness,
body[data-playback-paused="true"] .pipe-wave-base,
body[data-playback-paused="true"] .pipe-wave-line {
  animation-play-state: paused !important;
}
@media (prefers-reduced-motion: reduce) {
  .flow-gate,
  .pump-blades,
  .water-flow,
  .weather-raindrop,
  .catch-basin-fullness,
  .pipe-fullness,
  .pipe-wave-base,
  .pipe-wave-line { animation: none; }
}
@media (max-width: 1100px) {
  .workbench {
    grid-template-columns: 1fr;
  }
  .object-panel {
    position: static;
    max-height: none;
  }
}
.rail-title {
  fill: #172033;
  font-size: 36px;
  font-weight: 950;
}
.main-title {
  fill: #172033;
  font-size: 29px;
  font-weight: 950;
}
.rail-desc {
  fill: #3f4e62;
  font-size: 22px;
  font-weight: 850;
  paint-order: stroke;
  stroke: rgba(255,255,255,.9);
  stroke-width: 6px;
  stroke-linejoin: round;
}
.surface-item { stroke: #334155; stroke-width: 2.2; }
.cover { fill: #cbd5e1; stroke: #475467; stroke-width: 3; }
.shaft {
  stroke-width: 10;
  stroke-linecap: round;
  stroke-dasharray: 16 16;
  opacity: .52;
}
.rain {
  stroke: var(--storm);
  stroke-width: 7;
  stroke-linecap: round;
  opacity: .86;
}
.divider {
  stroke: rgba(23, 32, 51, .22);
  stroke-width: 3;
  stroke-dasharray: 16 16;
}
.hint {
  fill: #5c6b7d;
  font-size: 16px;
  font-weight: 850;
}
.object-label {
  fill: #f8fafc;
  font-size: 24px;
  font-weight: 950;
  paint-order: stroke;
  stroke: rgba(15, 23, 42, .88);
  stroke-width: 4px;
  stroke-linejoin: round;
}
.pipe-label {
  fill: #ffffff;
  font-size: 18px;
  font-weight: 950;
  paint-order: stroke;
  stroke: rgba(15, 23, 42, .82);
  stroke-width: 4px;
  stroke-linejoin: round;
}
.building-label {
  fill: #172033;
  font-size: 14px;
  font-weight: 950;
  paint-order: stroke;
  stroke: rgba(255,255,255,.9);
  stroke-width: 4px;
  stroke-linejoin: round;
}
</style>
</head>
<body>
<header>
  <div>
    <h1>전체 도시 배수도</h1>
    <div class="sub">분류식, 합류식, 하천을 각각 약 1200px 이상 폭으로 잡았습니다. 가로로 스크롤하면서 한 영역씩 크게 볼 수 있습니다.</div>
  </div>
  <div class="header-controls">
    <div class="playback-controls" aria-label="시나리오 플레이백">
      <label class="playback-control">
        <span>시나리오</span>
        <select data-playback-scenario>
          <option value="base">기본 폭우</option>
          <option value="overflow">폭우 월류</option>
          <option value="backflow">하천 역류</option>
        </select>
      </label>
      <button type="button" data-playback-toggle>재생</button>
      <button type="button" data-playback-step="-1">-1분</button>
      <button type="button" data-playback-step="1">+1분</button>
      <label class="playback-control">
        <span>시간</span>
        <input class="playback-time" type="range" min="0" max="0" step="1" value="0" data-playback-time>
      </label>
      <label class="playback-control">
        <span>속도</span>
        <select data-playback-speed>
          <option value="0.5">0.5x</option>
          <option value="1" selected>1x</option>
          <option value="2">2x</option>
          <option value="4">4x</option>
        </select>
      </label>
      <output class="playback-output" data-playback-output>데이터 대기</output>
    </div>
    <div class="hydraulic-controls" aria-label="화면 프리뷰용 전체 유속과 유량 조절">
      <label class="hydraulic-control">
        <span>프리뷰 유속</span>
        <input type="range" min="0.2" max="4" step="0.1" value="1" data-global-hydraulic-control="velocity">
        <output data-global-hydraulic-output="velocity">1.0x</output>
      </label>
      <label class="hydraulic-control">
        <span>프리뷰 차오름</span>
        <input type="range" min="0" max="100" step="1" value="42" data-global-hydraulic-control="waterLevel">
        <output data-global-hydraulic-output="waterLevel">42%</output>
      </label>
    </div>
    <div class="weather-controls" aria-label="강수량 조절">
      <label class="weather-control">
        <span>강수량</span>
        <input type="range" min="0" max="100" step="1" value="0" data-weather-control="rainfall">
        <output data-weather-output="rainfall">0%</output>
      </label>
    </div>
    <div class="flow-mode-controls" aria-label="물 흐름 방향 선택">
      <button type="button" data-flow-mode-button="forward">정방향</button>
      <button type="button" data-flow-mode-button="backflow">역류</button>
    </div>
  </div>
</header>

<main>
  <div class="workbench">
  <section class="stage" aria-label="분류식 합류식 하천 기본 배수도">
    <svg viewBox="0 0 7600 1870" role="img" aria-label="분류식, 합류식, 하천으로 구분된 전체 도시 배수도">
      <defs>
        <pattern id="soilPattern" width="38" height="24" patternUnits="userSpaceOnUse">
          <rect width="38" height="24" fill="var(--soil)"></rect>
          <path d="M0 8 C8 2 20 15 38 7 M0 19 C10 13 24 25 38 17" fill="none" stroke="var(--soil-line)" stroke-width="1" opacity=".50"></path>
        </pattern>
        <pattern id="waterPattern" width="54" height="22" patternUnits="userSpaceOnUse">
          <rect width="54" height="22" fill="var(--river)"></rect>

  function clampNumber(value, min, max, fallback) {
    const numericValue = Number(value);
    if (!Number.isFinite(numericValue)) return fallback;
    return clamp(numericValue, min, max);
  }

  function mixChannel(from, to, ratio) {
    return Math.round(from + (to - from) * ratio);
  }

  function mixRgb(from, to, ratio) {
    const safeRatio = clamp(Number(ratio) || 0, 0, 1);
    return `rgb(${mixChannel(from[0], to[0], safeRatio)}, ${mixChannel(from[1], to[1], safeRatio)}, ${mixChannel(from[2], to[2], safeRatio)})`;
  }

  function updateWeatherOutputs() {
    const rainfallOutput = document.querySelector('[data-weather-output="rainfall"]');
    if (rainfallOutput) rainfallOutput.textContent = `${Math.round(WEATHER_STATE.rainfall * 100)}%`;
  }

  function syncWeatherControls() {
    const rainfallControl = document.querySelector('[data-weather-control="rainfall"]');
    if (rainfallControl) rainfallControl.value = String(Math.round(WEATHER_STATE.rainfall * 100));
    updateWeatherOutputs();
  }

	  function setWeatherState(nextState = {}) {
	    if (Object.prototype.hasOwnProperty.call(nextState, 'rainfall')) {
	      WEATHER_STATE.rainfall = clamp(
	        clampNumber(nextState.rainfall, WEATHER_LIMITS.rainfall.min, WEATHER_LIMITS.rainfall.max, WEATHER_STATE.rainfall),
        WEATHER_LIMITS.rainfall.min,
        WEATHER_LIMITS.rainfall.max
      );
    }

    const rainfall = WEATHER_STATE.rainfall;
    const root = document.documentElement;
    const cloudFill = mixRgb([255, 255, 255], [100, 116, 139], rainfall);
    const cloudStroke = mixRgb([216, 224, 236], [71, 85, 105], rainfall);

    root.style.setProperty('--weather-sun-opacity', String(clamp(1 - rainfall * 1.7, 0, 1)));
    root.style.setProperty('--weather-cloud-fill', cloudFill);
    root.style.setProperty('--weather-cloud-stroke', cloudStroke);
    root.style.setProperty('--weather-rain-opacity', rainfall <= 0.01 ? '0' : String(clamp(0.18 + rainfall * 0.78, 0, 0.96)));
    root.style.setProperty('--weather-rain-duration', `${(1.75 - rainfall * 1.22).toFixed(2)}s`);
    root.style.setProperty('--weather-cloud-1-opacity', rainfall > 0.02 ? String(clamp(0.25 + rainfall * 0.65, 0, 0.9)) : '0');
    root.style.setProperty('--weather-cloud-2-opacity', rainfall > 0.18 ? String(clamp((rainfall - 0.18) * 1.1, 0, 0.85)) : '0');
    root.style.setProperty('--weather-cloud-3-opacity', rainfall > 0.34 ? String(clamp((rainfall - 0.34) * 1.25, 0, 0.9)) : '0');
    root.style.setProperty('--weather-cloud-4-opacity', rainfall > 0.52 ? String(clamp((rainfall - 0.52) * 1.45, 0, 0.9)) : '0');
    root.style.setProperty('--weather-cloud-5-opacity', rainfall > 0.72 ? String(clamp((rainfall - 0.72) * 2.2, 0, 0.88)) : '0');
    syncWeatherControls();
    return { ...WEATHER_STATE };
  }

  function formatPercent(value) {
    if (!Number.isFinite(Number(value))) return '-';
    return `${Math.round(Number(value) * 100)}%`;
  }

  function formatRate(value, unit = '') {
    if (!Number.isFinite(Number(value))) return '-';
    const safeValue = Number(value);
    return `${safeValue.toFixed(Math.abs(safeValue) >= 10 ? 1 : 3)}${unit}`;
  }

  function getObjectDefinition(objectType, objectId) {
    if (objectType === 'pipe') return PIPE_BY_ID[objectId] || null;
    if (objectType === 'asset') return ASSET_BY_ID[objectId] || null;
    return null;
  }

  function getObjectRuntimeState(objectType, objectId) {
    if (objectType === 'pipe') return getPipeState(objectId);
    if (objectType === 'asset') return getAssetState(objectId);
    return null;
  }

  function getObjectControlState(objectId) {
    return OBJECT_CONTROL_STATE.exceptions[objectId] || null;
  }

  function buildSwmmControlPayload(reason = 'manual') {
    const exceptions = Object.values(OBJECT_CONTROL_STATE.exceptions)
      .filter((item) => Number(item.blockage) > 0)
      .map((item) => ({
        id: item.id,
        swmmId: item.swmmId,
        objectType: item.objectType,
        blockage: Number(item.blockage),
      }));
    const blockagesById = Object.fromEntries(exceptions.map((item) => [item.id, {
      swmmId: item.swmmId,
      objectType: item.objectType,
      blockageRatio: item.blockage,
    }]));

	    return {
	      version: NETWORK_REGISTRY?.version || 'inline-fallback',
	      reason,
	      stepSeconds: 1,
	      rainfall: WEATHER_STATE.rainfall,
	      rainfallRatio: WEATHER_STATE.rainfall,
	      exceptions,
	      blockagesById,
	      physicsMode: 'swmm-step',
	      selected: OBJECT_CONTROL_STATE.selected,
	      updatedAt: new Date().toISOString(),
	    };
	  }

	  function renderControlPayload(reason = 'manual') {
	    const payload = buildSwmmControlPayload(reason);
	    OBJECT_CONTROL_STATE.lastPayload = payload;
	    OBJECT_CONTROL_STATE.updatedAt = payload.updatedAt;
	    const preview = document.querySelector('[data-control-payload]');
	    if (preview) {
	      preview.textContent = JSON.stringify(payload, null, 2);
	    }
	    return payload;
	  }

	  function notifySwmmControlChange(reason = 'manual') {
	    const payload = renderControlPayload(reason);
	    window.LAST_SWMM_CONTROL_PAYLOAD = payload;
	    window.dispatchEvent(new CustomEvent('swmm-control-change', { detail: payload }));
	    return payload;
	  }

	  function setRainfallControl(rainfall, options = {}) {
	    const shouldNotify = options.notify !== false;
	    setWeatherState({ rainfall });
	    OBJECT_CONTROL_STATE.rainfall = WEATHER_STATE.rainfall;
	    if (shouldNotify) {
	      notifySwmmControlChange(options.reason || 'rainfall');
	    } else {
	      renderControlPayload(options.reason || 'rainfall-sync');
	    }
	    return WEATHER_STATE.rainfall;
	  }

	  function setObjectException(objectType, objectId, nextState = {}, options = {}) {
	    const controlState = getObjectControlState(objectId);
	    if (!controlState) return null;
	    if (Object.prototype.hasOwnProperty.call(nextState, 'blockage')) {
	      controlState.blockage = clampNumber(nextState.blockage, 0, 1, controlState.blockage);
	    }
	    controlState.objectType = objectType;
	    controlState.swmmId = getObjectDefinition(objectType, objectId)?.swmmId || controlState.swmmId || objectId;
	    if (getPlaybackFrames().length > 0) {
	      applyPlaybackFrame(PLAYBACK_STATE.frameIndex);
	    } else {
	      applyExceptionHydraulicOverlay();
	    }
	    applyExceptionVisuals();
	    updateSelectedObjectPanel();
	    if (options.notify !== false) {
	      notifySwmmControlChange(options.reason || 'exception');
	    } else {
	      renderControlPayload(options.reason || 'exception-sync');
	    }
	    return { ...controlState };
	  }

	  function clearSelectedHighlights() {
	    document.querySelectorAll('.is-selected').forEach((element) => {
	      element.classList.remove('is-selected');
	    });
	  }

	  function markSelectedObject() {
	    clearSelectedHighlights();
	    const selected = OBJECT_CONTROL_STATE.selected;
	    if (!selected) return;
	    if (selected.objectType === 'asset') {
	      document.querySelectorAll(`[data-asset-id="${selected.id}"], [data-asset-level-for="${selected.id}"]`).forEach((element) => {
	        element.classList.add('is-selected');
	      });
	    }
	    if (selected.objectType === 'pipe') {
	      document.querySelectorAll(`[data-pipe-id="${selected.id}"], [data-pipe-level-for="${selected.id}"]`).forEach((element) => {
	        element.classList.add('is-selected');
	      });
	    }
	  }

	  function applyExceptionVisuals() {
	    document.querySelectorAll('.has-exception').forEach((element) => {
	      element.classList.remove('has-exception');
	    });
	    Object.values(OBJECT_CONTROL_STATE.exceptions).forEach((state) => {
	      if (Number(state.blockage) <= 0) return;
	      const selector = state.objectType === 'asset'
	        ? `[data-asset-id="${state.id}"], [data-asset-level-for="${state.id}"]`
	        : `[data-pipe-id="${state.id}"], [data-pipe-level-for="${state.id}"]`;
	      document.querySelectorAll(selector).forEach((element) => {
	        element.classList.add('has-exception');
	      });
	    });
	    markSelectedObject();
	  }

  function getBlockageRatio(objectId) {
    return clampNumber(OBJECT_CONTROL_STATE.exceptions[objectId]?.blockage, 0, 1, 0);
  }

  function patchPipeStateForException(pipeId, nextState, touchedPipes) {
    if (!PIPE_STATE[pipeId]) return;
    const state = PIPE_STATE[pipeId];
    if (Object.prototype.hasOwnProperty.call(nextState, 'velocity')) state.velocity = Number(nextState.velocity);
    if (Object.prototype.hasOwnProperty.call(nextState, 'flowRate')) state.flowRate = Number(nextState.flowRate);
    if (Object.prototype.hasOwnProperty.call(nextState, 'waterLevel')) state.waterLevel = Number(nextState.waterLevel);
    if (Object.prototype.hasOwnProperty.call(nextState, 'backflow')) state.backflow = Boolean(nextState.backflow);
    if (Object.prototype.hasOwnProperty.call(nextState, 'active')) state.active = Boolean(nextState.active);
    touchedPipes.add(pipeId);
  }

  function patchAssetStateForException(assetId, nextState, touchedAssets) {
    if (!ASSET_STATE[assetId]) return;
    const state = ASSET_STATE[assetId];
    if (Object.prototype.hasOwnProperty.call(nextState, 'waterLevel')) state.waterLevel = Number(nextState.waterLevel);
    if (Object.prototype.hasOwnProperty.call(nextState, 'flowRate')) state.flowRate = Number(nextState.flowRate);
    if (Object.prototype.hasOwnProperty.call(nextState, 'backflow')) state.backflow = Boolean(nextState.backflow);
    if (Object.prototype.hasOwnProperty.call(nextState, 'active')) state.active = Boolean(nextState.active);
    if (Object.prototype.hasOwnProperty.call(nextState, 'status')) state.status = String(nextState.status);
    if (Object.prototype.hasOwnProperty.call(nextState, 'controlSetting')) state.controlSetting = Number(nextState.controlSetting);
    touchedAssets.add(assetId);
  }

  function getPipeOpenness(pipeId) {
    const directOpenness = 1 - getBlockageRatio(pipeId);
    const state = PIPE_STATE[pipeId];
    if (!state) return directOpenness;
    if (state.active === false && Number(state.flowRate) <= 0.025 && !state.backflow) return 0;
    return directOpenness;
  }

  function getInputOpenRatio(inputPipeIds) {
    if (!inputPipeIds?.length) return 1;
    const total = inputPipeIds.reduce((sum, pipeId) => sum + getPipeOpenness(pipeId), 0);
    return clamp(total / inputPipeIds.length, 0, 1);
  }

  function getPositivePipeFlow(pipeId) {
    const state = PIPE_STATE[pipeId];
    if (!state) return 0;
    return Math.max(0, Number(state.flowRate) || 0);
  }

  function getUpstreamInflowForBlockedPipe(pipeId) {
    const upstreamPipeIds = PIPE_BACKUP_TARGETS[pipeId]?.pipes || [];
    return upstreamPipeIds.reduce((sum, upstreamPipeId) => sum + getPositivePipeFlow(upstreamPipeId), 0);
  }

  function getBlockedPipeBackflowCondition(pipeId, blockage) {
    const state = PIPE_STATE[pipeId];
    const waterLevel = clamp(Number(state?.waterLevel) || 0, 0, 1.18);
    const upstreamInflow = getUpstreamInflowForBlockedPipe(pipeId);
    const isBlocked = blockage >= BLOCKED_BACKFLOW_RULES.blockage;
    const isFull = waterLevel >= BLOCKED_BACKFLOW_RULES.fullLevel;
    const hasUpstreamInflow = upstreamInflow > BLOCKED_BACKFLOW_RULES.upstreamInflow;
    return {
      isBlocked,
      isFull,
      hasUpstreamInflow,
      upstreamInflow,
      shouldBackflow: isBlocked && isFull && hasUpstreamInflow,
    };
  }

  function applyBlockedPipeOverlay(pipeId, blockage, touchedPipes, touchedAssets) {
    const state = PIPE_STATE[pipeId];
    if (!state || blockage <= 0) return;
    const openRatio = 1 - blockage;
    const condition = getBlockedPipeBackflowCondition(pipeId, blockage);
    const currentLevel = clamp(Number(state.waterLevel) || 0, 0, 1);
    const shouldBackflow = condition.shouldBackflow;
    const reducedFlow = clamp((Number(state.flowRate) || 0) * openRatio, 0, 1.5);
    const reducedVelocity = clamp((Number(state.velocity) || 0) * Math.max(openRatio, 0.03), 0, 5);

    patchPipeStateForException(pipeId, {
      waterLevel: currentLevel,
      flowRate: shouldBackflow ? condition.upstreamInflow : (condition.isBlocked ? Math.min(reducedFlow, 0.02) : reducedFlow),
      velocity: shouldBackflow ? Math.max(reducedVelocity, 0.12) : (condition.isBlocked ? Math.min(reducedVelocity, 0.04) : reducedVelocity),
      backflow: shouldBackflow,
      active: currentLevel > 0.02 || reducedFlow > 0.025 || shouldBackflow,
    }, touchedPipes);

    const backupTargets = PIPE_BACKUP_TARGETS[pipeId];
    if (!backupTargets || !shouldBackflow) return;
    const backupFlow = clamp(condition.upstreamInflow, 0, 1.5);
    const backupLevel = clamp(0.52 + backupFlow * 0.38, 0, 1);

    backupTargets.pipes?.forEach((backupPipeId) => {
      const backupState = PIPE_STATE[backupPipeId];
      if (!backupState) return;
      patchPipeStateForException(backupPipeId, {
        waterLevel: clamp(Math.max(Number(backupState.waterLevel) || 0, backupLevel), 0, 1),
        flowRate: Math.max(Number(backupState.flowRate) || 0, backupFlow),
        velocity: Math.max(Number(backupState.velocity) || 0, 0.3),
        backflow: true,
        active: true,
      }, touchedPipes);
    });

    backupTargets.assets?.forEach((backupAssetId) => {
      const backupState = ASSET_STATE[backupAssetId];
      if (!backupState) return;
      patchAssetStateForException(backupAssetId, {
        waterLevel: clamp(Math.max(Number(backupState.waterLevel) || 0, backupLevel), 0, 1),
        flowRate: Math.max(Number(backupState.flowRate) || 0, backupFlow),
        active: true,
        status: 'backflow',
        controlSetting: backupAssetId === 'overflow_chamber'
          ? Math.min(Number(backupState.controlSetting ?? 1), Math.max(0, openRatio))
          : backupState.controlSetting,
      }, touchedAssets);
    });
  }

  function applyBlockedAssetOverlay(assetId, blockage, touchedPipes, touchedAssets) {
    const state = ASSET_STATE[assetId];
    if (!state || blockage <= 0) return;
    const outletPipeId = ASSET_OUTLET_PIPE_MAP[assetId];
    const almostBlocked = blockage >= BLOCKED_BACKFLOW_RULES.blockage;
    const incomingFlow = Math.max(Number(state.flowRate) || 0, WEATHER_STATE.rainfall * 0.35);
    const hasIncomingFlow = incomingFlow > BLOCKED_BACKFLOW_RULES.upstreamInflow;
    const currentLevel = clamp(Number(state.waterLevel) || 0, 0, 1);
    const nextLevel = hasIncomingFlow
      ? clamp(Math.max(currentLevel, 0.18 + blockage * 0.52), 0, 1)
      : currentLevel;
    const shouldBackflow = almostBlocked && nextLevel >= BLOCKED_BACKFLOW_RULES.fullLevel && hasIncomingFlow;

    patchAssetStateForException(assetId, {
      waterLevel: nextLevel,
      flowRate: hasIncomingFlow ? Math.max(Number(state.flowRate) || 0, incomingFlow) : Number(state.flowRate) || 0,
      active: hasIncomingFlow || currentLevel > 0.02,
      status: shouldBackflow ? 'backflow' : almostBlocked ? 'warning' : 'normal',
    }, touchedAssets);

    if (!outletPipeId || !PIPE_STATE[outletPipeId]) return;
    const outletState = PIPE_STATE[outletPipeId];
    const openRatio = 1 - blockage;
    const outletCurrentLevel = clamp(Number(outletState.waterLevel) || 0, 0, 1);
    const outletNextLevel = hasIncomingFlow
      ? clamp(Math.max(outletCurrentLevel, 0.22 + blockage * 0.58), 0, 1)
      : outletCurrentLevel;
    patchPipeStateForException(outletPipeId, {
      waterLevel: outletNextLevel,
      flowRate: (Number(outletState.flowRate) || 0) * openRatio,
      velocity: (Number(outletState.velocity) || 0) * Math.max(openRatio, 0.03),
      backflow: shouldBackflow,
      active: hasIncomingFlow || outletCurrentLevel > 0.02,
    }, touchedPipes);
  }

  function suppressDownstreamFromBlockedInputs(touchedPipes) {
    Object.entries(DOWNSTREAM_INPUT_PIPE_MAP).forEach(([downstreamPipeId, inputPipeIds]) => {
      const downstreamState = PIPE_STATE[downstreamPipeId];
      if (!downstreamState) return;
      const openRatio = getInputOpenRatio(inputPipeIds);
      if (openRatio >= 0.995) return;
      patchPipeStateForException(downstreamPipeId, {
        waterLevel: (Number(downstreamState.waterLevel) || 0) * openRatio,
        flowRate: (Number(downstreamState.flowRate) || 0) * openRatio,
        velocity: (Number(downstreamState.velocity) || 0) * Math.max(openRatio, 0.03),
        backflow: false,
        active: openRatio > 0.05,
      }, touchedPipes);
    });
  }

  function applyExceptionHydraulicOverlay() {
    const touchedPipes = new Set();
    const touchedAssets = new Set();

    Object.values(OBJECT_CONTROL_STATE.exceptions).forEach((state) => {
      const blockage = clampNumber(state.blockage, 0, 1, 0);
      if (blockage <= 0) return;
      if (state.objectType === 'pipe') {
        applyBlockedPipeOverlay(state.id, blockage, touchedPipes, touchedAssets);
      } else if (state.objectType === 'asset') {
        applyBlockedAssetOverlay(state.id, blockage, touchedPipes, touchedAssets);
      }
    });

    suppressDownstreamFromBlockedInputs(touchedPipes);
    touchedPipes.forEach((pipeId) => applyPipeVisual(PIPE_BY_ID[pipeId]));
    touchedAssets.forEach((assetId) => applyAssetVisual(ASSET_BY_ID[assetId]));
    updateSelectedObjectPanel();
  }

	  function describeObject(definition, objectType) {
	    if (!definition) return '선택한 객체 정보를 찾을 수 없습니다.';
	    if (objectType === 'pipe') {
	      return `${definition.label}입니다. 막힘 정도는 PySWMM에서 해당 link의 유효 통수능을 낮추는 제어값으로 전달됩니다.`;
	    }
	    if (definition.type === 'catch_basin') {
	      return `${definition.label}입니다. 막힘 정도는 빗물받이 유입 효율 저하로 전달됩니다.`;
	    }
	    return `${definition.label}입니다. 막힘 정도는 시설 내부 흐름 저항 또는 유입 제한 조건으로 전달됩니다.`;
	  }

	  function getWaterTypeLabel(waterType) {
	    return {
	      storm: '우수',
	      sewer: '오수',
	      combined: '합류수',
	      overflow: '월류수',
	      treated: '처리수',
	    }[waterType] || waterType || '-';
	  }

	  function updateSelectedObjectPanel() {
	    const panel = document.querySelector('.object-panel');
	    if (!panel) return;
	    const selected = OBJECT_CONTROL_STATE.selected;
	    const title = document.querySelector('[data-selected-title]');
	    const description = document.querySelector('[data-selected-description]');
	    const idOutput = document.querySelector('[data-selected-id]');
	    const swmmIdOutput = document.querySelector('[data-selected-swmm-id]');
	    const typeOutput = document.querySelector('[data-selected-type]');
	    const waterTypeOutput = document.querySelector('[data-selected-water-type]');
	    const levelOutput = document.querySelector('[data-selected-level]');
	    const flowOutput = document.querySelector('[data-selected-flow]');
	    const velocityOutput = document.querySelector('[data-selected-velocity]');
	    const directionOutput = document.querySelector('[data-selected-direction]');
	    const exceptionLabel = document.querySelector('[data-exception-label]');
	    const blockageControl = document.querySelector('[data-exception-control="blockage"]');
	    const blockageOutput = document.querySelector('[data-exception-output="blockage"]');

	    if (!selected) {
	      panel.classList.add('object-empty');
	      if (title) title.textContent = '배관이나 시설을 선택하세요';
	      if (description) description.textContent = '선택한 객체의 SWMM ID, 현재 상태, 막힘 정도를 여기에서 확인하고 조절합니다.';
	      if (idOutput) idOutput.textContent = '-';
	      if (swmmIdOutput) swmmIdOutput.textContent = '-';
	      if (typeOutput) typeOutput.textContent = '-';
	      if (waterTypeOutput) waterTypeOutput.textContent = '-';
	      renderControlPayload('panel-empty');
	      return;
	    }

	    const definition = getObjectDefinition(selected.objectType, selected.id);
	    const runtimeState = getObjectRuntimeState(selected.objectType, selected.id) || {};
	    const controlState = getObjectControlState(selected.id) || { blockage: 0 };
	    panel.classList.remove('object-empty');

	    if (title) title.textContent = definition?.label || selected.id;
	    if (description) description.textContent = describeObject(definition, selected.objectType);
	    if (idOutput) idOutput.textContent = selected.id;
	    if (swmmIdOutput) swmmIdOutput.textContent = definition?.swmmId || selected.id;
	    if (typeOutput) typeOutput.textContent = selected.objectType === 'pipe' ? '배관' : definition?.type || '시설';
	    if (waterTypeOutput) waterTypeOutput.textContent = getWaterTypeLabel(definition?.waterType);
	    if (levelOutput) levelOutput.textContent = formatPercent(runtimeState.waterLevel);
	    if (flowOutput) flowOutput.textContent = formatRate(runtimeState.flowRate, '');
	    if (velocityOutput) velocityOutput.textContent = selected.objectType === 'pipe' ? formatRate(runtimeState.velocity, 'x') : '-';
	    if (directionOutput) directionOutput.textContent = runtimeState.backflow ? '역류' : '정방향';
	    if (exceptionLabel) {
	      exceptionLabel.textContent = definition?.type === 'catch_basin' ? '빗물받이 막힘 정도' : '막힘 정도';
	    }
	    if (blockageControl) blockageControl.value = String(Math.round(Number(controlState.blockage || 0) * 100));
	    if (blockageOutput) blockageOutput.textContent = `${Math.round(Number(controlState.blockage || 0) * 100)}%`;
	    renderControlPayload('panel-update');
	  }

	  function selectObject(objectType, objectId) {
	    const definition = getObjectDefinition(objectType, objectId);
	    if (!definition) return null;
	    OBJECT_CONTROL_STATE.selected = {
	      id: objectId,
	      swmmId: definition.swmmId || objectId,
	      objectType,
	    };
	    markSelectedObject();
	    updateSelectedObjectPanel();
	    return OBJECT_CONTROL_STATE.selected;
	  }

  function estimateRainfallFromFrame(frame) {
    const stormPipeIds = [
      'sep_storm_lateral_catch_basin_1',
      'sep_storm_lateral_catch_basin_2',
      'sep_storm_main_1',
      'sep_storm_main_2',
      'sep_storm_trunk',
      'comb_storm_lateral_catch_basin_1',
      'comb_storm_lateral_catch_basin_2',
      'comb_main_1',
      'comb_main_2',
    ];
    const samples = stormPipeIds
      .map((pipeId) => frame?.pipes?.[pipeId])
      .filter(Boolean);
    if (samples.length === 0) return WEATHER_STATE.rainfall;
    const maxLevel = samples.reduce((max, item) => Math.max(max, Number(item.l) || 0), 0);
    const maxFlow = samples.reduce((max, item) => Math.max(max, Number(item.f) || 0), 0);
    return clamp(Math.max(maxLevel, maxFlow / 1.25), 0, 1);
  }

  function isRainInletAsset(asset) {
    return asset?.type === 'catch_basin';
  }

  function isRainInletPipe(pipe) {
    return pipe?.waterType === 'storm' && pipe.id.includes('catch_basin');
  }

  function applyRainfallInletFloor(definition, state) {
    const rainfall = WEATHER_STATE.rainfall;
    if (rainfall <= 0.01 || !definition) return state;

    const isAssetInlet = isRainInletAsset(definition);
    const isPipeInlet = isRainInletPipe(definition);
    if (!isAssetInlet && !isPipeInlet) return state;

    return {
      ...state,
      waterLevel: Math.max(Number(state.waterLevel) || 0, rainfall * 0.08),
      flowRate: Math.max(Number(state.flowRate) || 0, rainfall * 0.28),
      velocity: Object.prototype.hasOwnProperty.call(state, 'velocity')
        ? Math.max(Number(state.velocity) || 0, 0.45 + rainfall * 0.6)
        : state.velocity,
      active: true,
    };
  }

  function getFullnessColor(waterLevel) {
    const safeLevel = clamp(Number(waterLevel) || 0, 0, 1);
    const blue = [56, 189, 248];
    const red = [239, 68, 68];
    const color = blue.map((channel, index) => (
      Math.round(channel + (red[index] - channel) * safeLevel)
    ));
    return `rgb(${color[0]}, ${color[1]}, ${color[2]})`;
  }

  function setFullnessMotionSpeed(velocity) {
    const safeVelocity = clampNumber(velocity, HYDRAULIC_LIMITS.velocity.min, HYDRAULIC_LIMITS.velocity.max, 1);
    document.querySelectorAll('#pipeFullWavePattern animateTransform').forEach((animation) => {
      animation.setAttribute('dur', `${(2.4 / safeVelocity).toFixed(2)}s`);
    });
  }

  function setFullnessTheme(waterLevel) {
    const safeLevel = clampNumber(waterLevel, HYDRAULIC_LIMITS.waterLevel.min, HYDRAULIC_LIMITS.waterLevel.max, 0);
    document.documentElement.style.setProperty('--fullness-color', getFullnessColor(safeLevel));
    document.body.dataset.fullnessState = 'manual';
    document.body.dataset.fullnessLevel = safeLevel >= 0.98 ? 'full' : 'partial';
  }

  function applyLevelElementVisual(levelElement, waterLevel, flowRate = 1) {
    const safeLevel = clampNumber(waterLevel, HYDRAULIC_LIMITS.waterLevel.min, HYDRAULIC_LIMITS.waterLevel.max, 0);
    const safeFlowRate = clampNumber(flowRate, 0, 1.5, 0);
    levelElement.style.opacity = String(clamp(0.22 + safeFlowRate * 0.46, 0.22, 0.78));
    levelElement.style.animation = 'none';
    levelElement.style.transform = `scaleY(${safeLevel})`;
  }

  function getPipeLevelElements(pipeId) {
    return Array.from(document.querySelectorAll(`[data-pipe-level-for="${pipeId}"]`));

  function applyPipeLevelVisual(pipe) {

    getPipeLevelElements(pipe.id).forEach((levelElement) => {
      applyLevelElementVisual(levelElement, state.waterLevel, state.flowRate);
    });
  }

  function applyPipeFullnessVisuals() {
    document.querySelectorAll('.pipe-fullness:not([data-asset-level-for]):not([data-pipe-level-for])').forEach((levelElement) => {
      applyLevelElementVisual(levelElement, GLOBAL_HYDRAULIC_STATE.waterLevel, GLOBAL_HYDRAULIC_STATE.waterLevel * 1.5);
    });

  function getPipeBaseDuration(pipe) {
    if (pipe.size === 'large') return 2.8;
    if (pipe.size === 'medium') return 2.3;
    return 1.8;
  }

  function getPipeState(pipeId) {
    if (!PIPE_STATE[pipeId]) return null;
    return { ...PIPE_STATE[pipeId] };
  }

  function getAssetState(assetId) {
    if (!ASSET_STATE[assetId]) return null;
    return { ...ASSET_STATE[assetId] };
  }

  function getPipeFlowElements(pipeId) {
    return {
      forward: document.querySelector(`.water-flow[data-pipe-id="${pipeId}"]:not(.backflow)`),
      backflow: document.querySelector(`.water-flow.backflow[data-pipe-id="${pipeId}"]`),
    };
  }

  function applyPipeVisual(pipe) {
    const state = PIPE_STATE[pipe.id];
    const { forward, backflow } = getPipeFlowElements(pipe.id);
    const isBackflow = currentFlowMode === 'backflow' || state.backflow;
    const safeVelocity = clamp(Number(state.velocity) || 1, 0.15, 5);
    const safeFlowRate = clamp(Number(state.flowRate) || 0, 0, 1.5);
    const pumpBoost = pipe.id === 'storm_pump_discharge_pipe' && ASSET_STATE.storm_pump_station?.active ? 1.65 : 1;
    const isForcedOff = state.active === false && !state.backflow && safeFlowRate <= 0.025;
    const hasVisibleFlow = !isForcedOff && (
      state.backflow || pipe.alwaysFlow || (state.active !== false && safeFlowRate > 0.025)
    );
    const flowDuration = `${(getPipeBaseDuration(pipe) / (safeVelocity * pumpBoost)).toFixed(2)}s`;
    const baseOpacity = pipe.alwaysFlow ? 0.42 : 0.28;
    const flowOpacity = String(clamp(baseOpacity + safeFlowRate * 0.42, baseOpacity, 0.9));

    [forward, backflow].forEach((flow) => {
      if (!flow) return;
      flow.style.setProperty('--flow-duration', flowDuration);
      flow.style.opacity = flowOpacity;
    });

    if (forward) forward.classList.toggle('is-hidden-flow', isBackflow || !hasVisibleFlow);
    if (backflow) backflow.classList.toggle('is-hidden-flow', !isBackflow || !hasVisibleFlow);
    applyPipeLevelVisual(pipe);
  }

  function applyPipeStates() {
    PIPE_DEFINITIONS.forEach(applyPipeVisual);
  }

  function getAssetLevelElements(assetId) {
    return Array.from(document.querySelectorAll(`[data-asset-level-for="${assetId}"]`));
  }

  function applyAssetVisual(asset) {
    const state = ASSET_STATE[asset.id];
    const levelElements = getAssetLevelElements(asset.id);
    const safeFlowRate = clamp(Number(state.flowRate) || 0, 0, 1.5);
    const root = document.documentElement;

    levelElements.forEach((levelElement) => {
      if (state.waterLevel !== null && state.waterLevel !== undefined && Number.isFinite(Number(state.waterLevel))) {
        applyLevelElementVisual(levelElement, state.waterLevel, safeFlowRate);
      } else {
        levelElement.style.opacity = String(clamp(0.22 + safeFlowRate * 0.46, 0.22, 0.78));
        levelElement.style.removeProperty('animation');
        levelElement.style.removeProperty('transform');
      }
    });

    if (asset.id === 'overflow_chamber') {
      const setting = clamp(Number(state.controlSetting ?? 1), 0, 1);
      root.style.setProperty('--gate-rotation', `${Math.round((1 - setting) * 42)}deg`);
    }
    if (asset.id === 'storm_pump_station') {
      const pumpActive = Boolean(state.active);
      document.querySelectorAll('.pump-blades').forEach((blade) => {
        blade.style.animationDuration = pumpActive ? `${Math.max(0.45, 1.05 - safeFlowRate * 0.22).toFixed(2)}s` : '1.1s';
        blade.style.animationPlayState = pumpActive ? 'running' : 'paused';
        blade.style.opacity = pumpActive ? '1' : '.35';

      applyPipeVisual(PIPE_BY_ID.storm_pump_discharge_pipe);
    }
  }

  function applyAssetStates() {
    ASSET_DEFINITIONS.forEach(applyAssetVisual);
  }

      PIPE_STATE[pipeId].flowRate = Number(nextState.flowRate);

      PIPE_STATE[pipeId].waterLevel = Number(nextState.waterLevel);

    if (Object.prototype.hasOwnProperty.call(nextState, 'backflow')) {
      PIPE_STATE[pipeId].backflow = Boolean(nextState.backflow);

  function setAssetState(assetId, nextState = {}) {

    if (Object.prototype.hasOwnProperty.call(nextState, 'waterLevel')) {
      ASSET_STATE[assetId].waterLevel =

    }
    if (Object.prototype.hasOwnProperty.call(nextState, 'flowRate')) {
      ASSET_STATE[assetId].flowRate = Number(nextState.flowRate);
    }
    if (Object.prototype.hasOwnProperty.call(nextState, 'backflow')) {
      ASSET_STATE[assetId].backflow = Boolean(nextState.backflow);
    }
    if (Object.prototype.hasOwnProperty.call(nextState, 'active')) {
      ASSET_STATE[assetId].active = Boolean(nextState.active);
    }
    if (Object.prototype.hasOwnProperty.call(nextState, 'status')) {
      ASSET_STATE[assetId].status = String(nextState.status);
    }

	      ASSET_STATE[assetId].controlSetting = Number(nextState.controlSetting);
	    }

	    applyAssetVisual(ASSET_BY_ID[assetId]);

  function listPipes() {
    return PIPE_DEFINITIONS.map(({ id, swmmId, htmlId, label, system, waterType, size, direction, alwaysFlow }) => ({
      id,
      swmmId,
      htmlId,
      label,
      system,
      waterType,
      size,
      direction,

  function listAssets() {
    return ASSET_DEFINITIONS.map(({ id, swmmId, htmlId, label, type, system, waterType, domId }) => ({
      id,
      swmmId,
      htmlId,
      label,
      type,
      system,

  function getGlobalHydraulicState() {
    return { ...GLOBAL_HYDRAULIC_STATE };
  }

  function updateGlobalHydraulicOutputs() {
    const velocityOutput = document.querySelector('[data-global-hydraulic-output="velocity"]');
    const waterLevelOutput = document.querySelector('[data-global-hydraulic-output="waterLevel"]');
    if (velocityOutput) velocityOutput.textContent = `${GLOBAL_HYDRAULIC_STATE.velocity.toFixed(1)}x`;
    if (waterLevelOutput) waterLevelOutput.textContent = `${Math.round(GLOBAL_HYDRAULIC_STATE.waterLevel * 100)}%`;
  }

  function syncGlobalHydraulicControls() {
    const velocityControl = document.querySelector('[data-global-hydraulic-control="velocity"]');
    const waterLevelControl = document.querySelector('[data-global-hydraulic-control="waterLevel"]');
    if (velocityControl) velocityControl.value = String(GLOBAL_HYDRAULIC_STATE.velocity);
    if (waterLevelControl) waterLevelControl.value = String(Math.round(GLOBAL_HYDRAULIC_STATE.waterLevel * 100));
    updateGlobalHydraulicOutputs();
  }

  function setGlobalHydraulicState(nextState = {}) {
    if (Object.prototype.hasOwnProperty.call(nextState, 'velocity')) {
      GLOBAL_HYDRAULIC_STATE.velocity = clamp(
        clampNumber(nextState.velocity, HYDRAULIC_LIMITS.velocity.min, HYDRAULIC_LIMITS.velocity.max, GLOBAL_HYDRAULIC_STATE.velocity),
        HYDRAULIC_LIMITS.velocity.min,
        HYDRAULIC_LIMITS.velocity.max
      );
    }
    if (Object.prototype.hasOwnProperty.call(nextState, 'waterLevel')) {
      GLOBAL_HYDRAULIC_STATE.waterLevel = clamp(
        clampNumber(nextState.waterLevel, HYDRAULIC_LIMITS.waterLevel.min, HYDRAULIC_LIMITS.waterLevel.max, GLOBAL_HYDRAULIC_STATE.waterLevel),
        HYDRAULIC_LIMITS.waterLevel.min,
        HYDRAULIC_LIMITS.waterLevel.max
      );
    }

    PIPE_DEFINITIONS.forEach((pipe) => {
      PIPE_STATE[pipe.id].velocity = GLOBAL_HYDRAULIC_STATE.velocity;
      PIPE_STATE[pipe.id].flowRate = GLOBAL_HYDRAULIC_STATE.waterLevel * 1.5;
      PIPE_STATE[pipe.id].waterLevel = GLOBAL_HYDRAULIC_STATE.waterLevel;
      PIPE_STATE[pipe.id].active = GLOBAL_HYDRAULIC_STATE.waterLevel > 0.02;
    });
    ASSET_DEFINITIONS.forEach((asset) => {
      ASSET_STATE[asset.id].waterLevel = GLOBAL_HYDRAULIC_STATE.waterLevel;
      ASSET_STATE[asset.id].flowRate = GLOBAL_HYDRAULIC_STATE.waterLevel * 1.5;
      if (asset.id === 'storm_pump_station') {
        ASSET_STATE[asset.id].active = GLOBAL_HYDRAULIC_STATE.waterLevel >= 0.55;
      }
      ASSET_STATE[asset.id].controlSetting = 1;
    });

    setFullnessTheme(GLOBAL_HYDRAULIC_STATE.waterLevel);
    setFullnessMotionSpeed(GLOBAL_HYDRAULIC_STATE.velocity);
    applyPipeStates();
    applyPipeFullnessVisuals();
    applyAssetStates();
    applyExceptionHydraulicOverlay();
    syncGlobalHydraulicControls();

    return getGlobalHydraulicState();
  }

  function getPlaybackScenarioData() {
    return PLAYBACK_DATA?.scenarios?.[PLAYBACK_STATE.scenario] || null;
  }

  function getPlaybackFrames() {
    return getPlaybackScenarioData()?.frames || [];
  }

  function formatPlaybackTime(isoTime) {
    if (!isoTime) return '00:00';
    const date = new Date(isoTime);
    if (Number.isNaN(date.getTime())) return isoTime.slice(11, 16);
    return date.toLocaleTimeString('ko-KR', {
      hour: '2-digit',
      minute: '2-digit',
      hour12: false,
    });
  }

  function updatePlaybackOutput(frame) {
    const output = document.querySelector('[data-playback-output]');
    if (!output) return;
    const scenario = getPlaybackScenarioData();
    if (!scenario || !frame) {
      output.textContent = '데이터 없음';
      return;
    }

    const riskyItems = [
      ...Object.values(frame.pipes || {}),
      ...Object.values(frame.assets || {}),
    ].filter((item) => item.r && item.r !== 'normal');
    const riskLabel = riskyItems.length > 0 ? ` / 이벤트 ${riskyItems.length}` : '';
    output.textContent = `${scenario.title} ${formatPlaybackTime(frame.time)}${riskLabel}`;
  }

  function syncPlaybackControls(frame) {
    const frames = getPlaybackFrames();
    const scenarioControl = document.querySelector('[data-playback-scenario]');
    const timeControl = document.querySelector('[data-playback-time]');
    const speedControl = document.querySelector('[data-playback-speed]');
    const toggle = document.querySelector('[data-playback-toggle]');

    if (scenarioControl) scenarioControl.value = PLAYBACK_STATE.scenario;
    if (timeControl) {
      timeControl.max = String(Math.max(frames.length - 1, 0));
      timeControl.value = String(PLAYBACK_STATE.frameIndex);
      timeControl.disabled = frames.length === 0;
    }
    if (speedControl) speedControl.value = String(PLAYBACK_STATE.speed);
    if (toggle) {
      toggle.textContent = PLAYBACK_STATE.playing ? '정지' : '재생';
      toggle.classList.toggle('is-playing', PLAYBACK_STATE.playing);
      toggle.disabled = frames.length === 0;
    }
    updatePlaybackOutput(frame);
  }

  function setPlaybackAnimationPaused(paused) {
    const shouldPause = Boolean(paused);
    document.body.dataset.playbackPaused = shouldPause ? 'true' : 'false';
    document.querySelectorAll('svg').forEach((svg) => {
      if (shouldPause && typeof svg.pauseAnimations === 'function') {
        svg.pauseAnimations();
      }
      if (!shouldPause && typeof svg.unpauseAnimations === 'function') {
        svg.unpauseAnimations();
      }
    });
  }

	  function applyFrameHydraulicTheme(frame) {
    const pipeStates = Object.values(frame.pipes || {});
    const assetStates = Object.values(frame.assets || {});
    const allStates = [...pipeStates, ...assetStates];
    const maxLevel = allStates.reduce((max, item) => Math.max(max, Number(item.l) || 0), 0);
    const pipeVelocities = pipeStates.map((item) => Number(item.v) || 0).filter(Boolean);
    const avgVelocity = pipeVelocities.length
      ? pipeVelocities.reduce((sum, value) => sum + value, 0) / pipeVelocities.length
      : 1;

    GLOBAL_HYDRAULIC_STATE.velocity = clamp(avgVelocity, HYDRAULIC_LIMITS.velocity.min, HYDRAULIC_LIMITS.velocity.max);
    GLOBAL_HYDRAULIC_STATE.waterLevel = clamp(maxLevel, HYDRAULIC_LIMITS.waterLevel.min, HYDRAULIC_LIMITS.waterLevel.max);
    setFullnessTheme(GLOBAL_HYDRAULIC_STATE.waterLevel);
    setFullnessMotionSpeed(GLOBAL_HYDRAULIC_STATE.velocity);
	    setRainfallControl(estimateRainfallFromFrame(frame), { notify: false, reason: 'playback-rainfall' });
	    syncGlobalHydraulicControls();
	  }

  function applySwmmStatePayload(payload = {}, options = {}) {
    if (Object.prototype.hasOwnProperty.call(payload, 'rainfallRatio')) {
      setRainfallControl(Number(payload.rainfallRatio) || 0, {
        notify: options.notifyControlChange === true,
        reason: 'swmm-state-rainfall',
      });
    }

    Object.entries(payload.assets || {}).forEach(([assetId, state]) => {
      const nextAssetState = {
        waterLevel: state.depth_ratio ?? state.fullness ?? state.waterLevel ?? 0,
        flowRate: clamp(Number(state.inflow_cms ?? state.flow_cms ?? state.flowRate ?? 0), 0, 1.5),
        backflow: state.direction === 'reverse' || state.backflow === true,
      };
      if (Object.prototype.hasOwnProperty.call(state, 'active')) nextAssetState.active = state.active;
      if (Object.prototype.hasOwnProperty.call(state, 'status')) nextAssetState.status = state.status;
      if (Object.prototype.hasOwnProperty.call(state, 'target_setting') || Object.prototype.hasOwnProperty.call(state, 'controlSetting')) {
        nextAssetState.controlSetting = state.target_setting ?? state.controlSetting;
      }
      setAssetState(assetId, nextAssetState);
    });

    Object.entries(payload.pipes || {}).forEach(([pipeId, state]) => {
      const flowCms = Number(state.flow_cms ?? state.outflow_cms ?? state.flowRate ?? 0) || 0;
      const capacityCms = Number(state.capacity_cms ?? state.effective_capacity_cms ?? 0) || 0;
      const flowRatio = capacityCms > 0 ? Math.abs(flowCms) / capacityCms : Math.abs(flowCms);
      const nextPipeState = {
        velocity: Math.abs(Number(state.velocity_mps ?? state.velocity ?? 0)) || 0,
        flowRate: clamp(flowRatio, 0, 1.5),
        waterLevel: state.fullness ?? state.waterLevel ?? 0,
        backflow: state.direction === 'reverse' || state.backflow === true,
      };
      if (Object.prototype.hasOwnProperty.call(state, 'active')) {
        nextPipeState.active = state.active;
      } else {
        nextPipeState.active = Math.abs(flowCms) > 0.002;
      }
      setPipeState(pipeId, nextPipeState);
    });

    const pumpControl = payload.controls?.storm_pump_unit;
    if (pumpControl) {
      setAssetState('storm_pump_station', {
        active: Boolean(pumpControl.active || Number(pumpControl.target_setting) > 0),
        controlSetting: Number(pumpControl.target_setting ?? 0),
      });
    }

    const overflowControl = payload.controls?.overflow_to_interceptor_drop;
    if (overflowControl) {
      setAssetState('overflow_chamber', {
        controlSetting: Number(overflowControl.target_setting ?? 1),
      });
    }

    applyPipeFullnessVisuals();
    updateSelectedObjectPanel();
    return payload;
  }

  function applyPlaybackFrame(frameIndex = PLAYBACK_STATE.frameIndex) {
    const frames = getPlaybackFrames();
    if (frames.length === 0) {
      syncPlaybackControls(null);
      return null;
    }

    PLAYBACK_STATE.frameIndex = clamp(Math.round(frameIndex), 0, frames.length - 1);
    const frame = frames[PLAYBACK_STATE.frameIndex];
    applyFrameHydraulicTheme(frame);

    Object.entries(frame.assets || {}).forEach(([assetId, state]) => {
      const visualState = applyRainfallInletFloor(ASSET_BY_ID[assetId], {
        waterLevel: state.l,
        flowRate: state.f,
        backflow: state.b,
        active: state.a,
        status: state.s,
        controlSetting: state.g,
      });
      setAssetState(assetId, visualState);
    });

    Object.entries(frame.pipes || {}).forEach(([pipeId, state]) => {
      const visualState = applyRainfallInletFloor(PIPE_BY_ID[pipeId], {
        velocity: state.v,
        flowRate: state.f,
        waterLevel: state.l,
        backflow: state.b,
        active: state.a,
      });
      setPipeState(pipeId, visualState);
    });

    applyExceptionHydraulicOverlay();
    applyExceptionVisuals();
    syncPlaybackControls(frame);
    return frame;
  }

  function stopPlayback() {
    if (PLAYBACK_STATE.timerId) {
      window.clearInterval(PLAYBACK_STATE.timerId);
      PLAYBACK_STATE.timerId = null;
    }
    PLAYBACK_STATE.playing = false;
    setPlaybackAnimationPaused(true);
    syncPlaybackControls(getPlaybackFrames()[PLAYBACK_STATE.frameIndex]);
  }

  function stepPlayback(step = 1) {
    const frames = getPlaybackFrames();
    if (frames.length === 0) return null;
    const nextIndex = PLAYBACK_STATE.frameIndex + step;
    if (nextIndex >= frames.length) {
      stopPlayback();
      return applyPlaybackFrame(frames.length - 1);
    }
    if (nextIndex < 0) {
      return applyPlaybackFrame(0);
    }
    return applyPlaybackFrame(nextIndex);
  }

  function startPlayback() {
    const frames = getPlaybackFrames();
    if (frames.length === 0) return;
    if (PLAYBACK_STATE.frameIndex >= frames.length - 1) {
      PLAYBACK_STATE.frameIndex = 0;
    }
	    stopPlayback();
	    PLAYBACK_STATE.playing = true;
	    setPlaybackAnimationPaused(false);
	    applyPlaybackFrame(PLAYBACK_STATE.frameIndex);
	    const intervalMs = Math.max(180, 900 / PLAYBACK_STATE.speed);
	    PLAYBACK_STATE.timerId = window.setInterval(() => stepPlayback(1), intervalMs);
	  }

  function setPlaybackScenario(scenario) {
    if (!PLAYBACK_DATA?.scenarios?.[scenario]) return null;
    stopPlayback();
    PLAYBACK_STATE.scenario = scenario;
    PLAYBACK_STATE.frameIndex = 0;
    return applyPlaybackFrame(0);
  }

  function setupPlaybackControls() {
    const scenarioControl = document.querySelector('[data-playback-scenario]');
    const timeControl = document.querySelector('[data-playback-time]');
    const speedControl = document.querySelector('[data-playback-speed]');
    const toggle = document.querySelector('[data-playback-toggle]');

    if (!PLAYBACK_DATA) {
      syncPlaybackControls(null);
      return;
    }

    if (scenarioControl) {
      scenarioControl.innerHTML = '';
      PLAYBACK_DATA.scenarioOrder.forEach((scenarioKey) => {
        const scenario = PLAYBACK_DATA.scenarios[scenarioKey];
        const option = document.createElement('option');
        option.value = scenarioKey;
        option.textContent = scenario.title || scenarioKey;
        scenarioControl.appendChild(option);
      });
      scenarioControl.addEventListener('change', () => setPlaybackScenario(scenarioControl.value));
    }

    if (timeControl) {
      timeControl.addEventListener('input', () => {
        stopPlayback();
        applyPlaybackFrame(Number(timeControl.value));
      });
    }

    if (speedControl) {
      speedControl.addEventListener('change', () => {
        PLAYBACK_STATE.speed = Number(speedControl.value) || 1;
        if (PLAYBACK_STATE.playing) startPlayback();
      });
    }

    if (toggle) {
      toggle.addEventListener('click', () => {
        if (PLAYBACK_STATE.playing) {
          stopPlayback();
        } else {
          startPlayback();
        }
      });
    }

    document.querySelectorAll('[data-playback-step]').forEach((button) => {
      button.addEventListener('click', () => {
        stopPlayback();
        stepPlayback(Number(button.dataset.playbackStep) || 0);
      });
    });

    setPlaybackScenario(PLAYBACK_STATE.scenario);
  }

  function assignPipeLevelElements(flow, pipeId) {
    let cursor = flow.previousElementSibling;
    while (
      cursor &&
      cursor.classList?.contains('pipe-fullness') &&
      !cursor.dataset.assetLevelFor
    ) {
      cursor.dataset.pipeLevelFor = pipeId;
      cursor = cursor.previousElementSibling;
    }
  }

  const forwardFlows = Array.from(document.querySelectorAll('.water-flow:not(.backflow)'));

  if (forwardFlows.length !== PIPE_DEFINITIONS.length) {
    console.warn(
      `Pipe definition count mismatch: ${PIPE_DEFINITIONS.length} definitions, ${forwardFlows.length} flow paths.`
    );
  }

	  forwardFlows.forEach((flow, index) => {
	    const pipe = PIPE_DEFINITIONS[index];
	    if (!pipe) return;
	    flow.dataset.pipeId = pipe.id;
    flow.id = `${pipe.id}__forward_flow`;
    flow.setAttribute('aria-label', `${pipe.label} 정방향 흐름`);
    assignPipeLevelElements(flow, pipe.id);

    const backflow = flow.cloneNode(false);
    backflow.classList.add('backflow');
    backflow.id = `${pipe.id}__backflow_flow`;
    backflow.setAttribute('aria-hidden', 'true');
	    flow.after(backflow);

	    const hitArea = flow.cloneNode(false);
	    hitArea.classList.remove('water-flow', 'backflow', 'is-hidden-flow');
	    hitArea.classList.add('pipe-hit-area');
	    hitArea.dataset.pipeId = pipe.id;
	    hitArea.id = `${pipe.id}__hit_area`;
	    hitArea.setAttribute('aria-label', `${pipe.label} 선택 영역`);
	    hitArea.setAttribute('role', 'button');
	    hitArea.setAttribute('tabindex', '0');
	    backflow.after(hitArea);
	  });

	  function setupSelectableObjects() {
	    document.querySelectorAll('[data-asset-id]').forEach((element) => {
	      element.setAttribute('tabindex', '0');
	      element.setAttribute('role', 'button');
	      element.addEventListener('click', (event) => {
	        event.stopPropagation();
	        selectObject('asset', element.dataset.assetId);
	      });
	      element.addEventListener('keydown', (event) => {
	        if (event.key === 'Enter' || event.key === ' ') {
	          event.preventDefault();
	          selectObject('asset', element.dataset.assetId);
	        }
	      });
	    });

	    document.querySelectorAll('[data-pipe-id], [data-pipe-level-for]').forEach((element) => {
	      const pipeId = element.dataset.pipeId || element.dataset.pipeLevelFor;
	      if (!pipeId) return;
	      element.setAttribute('tabindex', '0');
	      element.setAttribute('role', 'button');
	      element.addEventListener('click', (event) => {
	        event.stopPropagation();
	        selectObject('pipe', pipeId);
	      });
	      element.addEventListener('keydown', (event) => {
	        if (event.key === 'Enter' || event.key === ' ') {
	          event.preventDefault();
	          selectObject('pipe', pipeId);
	        }
	      });
	    });
	  }

  function setFlowMode(mode) {
    currentFlowMode = flowModes.has(mode) ? mode : 'forward';
    document.body.dataset.flowMode = currentFlowMode;
    document.querySelectorAll('[data-flow-mode-button]').forEach((button) => {
      button.classList.toggle('is-active', button.dataset.flowModeButton === currentFlowMode);
    });
    applyPipeStates();
  }

  document.querySelectorAll('[data-flow-mode-button]').forEach((button) => {
    button.addEventListener('click', () => setFlowMode(button.dataset.flowModeButton));
  });

  document.querySelectorAll('[data-global-hydraulic-control]').forEach((control) => {
    control.addEventListener('input', () => {
      stopPlayback();
      if (control.dataset.globalHydraulicControl === 'velocity') {
        setGlobalHydraulicState({ velocity: Number(control.value) });
      }
      if (control.dataset.globalHydraulicControl === 'waterLevel') {
        setGlobalHydraulicState({ waterLevel: Number(control.value) / 100 });
      }
    });
  });

	  document.querySelectorAll('[data-weather-control]').forEach((control) => {
	    control.addEventListener('input', () => {
	      stopPlayback();
	      if (control.dataset.weatherControl === 'rainfall') {
	        setRainfallControl(Number(control.value) / 100, { reason: 'rainfall-control' });
	      }
	    });
	  });

	  document.querySelectorAll('[data-exception-control]').forEach((control) => {
	    control.addEventListener('input', () => {
	      const selected = OBJECT_CONTROL_STATE.selected;
	      if (!selected) return;
	      if (control.dataset.exceptionControl === 'blockage') {
	        setObjectException(selected.objectType, selected.id, {
	          blockage: Number(control.value) / 100,
	        }, { reason: 'object-blockage-control' });
	      }
	    });
	  });

	  window.PIPE_DEFINITIONS = PIPE_DEFINITIONS;
	  window.PIPE_BY_ID = PIPE_BY_ID;
	  window.PIPE_STATE = PIPE_STATE;
	  window.NETWORK_REGISTRY_VERSION = NETWORK_REGISTRY?.version || 'inline-fallback';
	  window.GLOBAL_HYDRAULIC_STATE = GLOBAL_HYDRAULIC_STATE;
	  window.WEATHER_STATE = WEATHER_STATE;
	  window.SWMM_CONTROL_STATE = OBJECT_CONTROL_STATE;
	  window.ASSET_DEFINITIONS = ASSET_DEFINITIONS;
  window.ASSET_BY_ID = ASSET_BY_ID;
  window.ASSET_STATE = ASSET_STATE;
  window.listPipes = listPipes;
  window.listAssets = listAssets;
  window.getPipeState = getPipeState;
  window.getAssetState = getAssetState;
  window.getGlobalHydraulicState = getGlobalHydraulicState;
	  window.setWeatherState = setWeatherState;
	  window.setRainfallControl = setRainfallControl;
	  window.setPipeState = setPipeState;
	  window.setAssetState = setAssetState;
	  window.setObjectException = setObjectException;
	  window.selectObject = selectObject;
	  window.buildSwmmControlPayload = buildSwmmControlPayload;
	  window.setGlobalHydraulicState = setGlobalHydraulicState;
  window.applyPipeStates = applyPipeStates;
  window.applyAssetStates = applyAssetStates;
  window.setFlowMode = setFlowMode;
  window.PLAYBACK_DATA = PLAYBACK_DATA;
  window.PLAYBACK_STATE = PLAYBACK_STATE;
  window.applySwmmStatePayload = applySwmmStatePayload;
  window.applyPlaybackFrame = applyPlaybackFrame;
  window.startPlayback = startPlayback;
  window.stopPlayback = stopPlayback;
  window.setPlaybackScenario = setPlaybackScenario;

	  setFlowMode(initialFlowMode);
	  setupSelectableObjects();
	  setWeatherState(WEATHER_STATE);
	  setGlobalHydraulicState(GLOBAL_HYDRAULIC_STATE);
	  setupPlaybackControls();
	  updateSelectedObjectPanel();
</script>
</body>
</html>
